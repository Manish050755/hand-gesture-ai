<!DOCTYPE html>
<html>
<head>
  <title>AI Hand Gesture Control</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; font-family: sans-serif; }
    canvas { position: absolute; left: 0; top: 0; }
    #container { position: relative; width: 640px; height: 480px; margin-top: 20px; }
    #status { padding: 10px; font-size: 24px; font-weight: bold; color: #00ff00; }
  </style>
</head>
<body>
  <h1>Gesture Controller</h1>
  <div id="status">Waiting for Hand...</div>
  <div id="container">
    <video id="input_video" style="display:none;"></video>
    <canvas id="output_canvas" width="640px" height="480px"></canvas>
  </div>
  <script src="script.js"></script>
</body>
</html>
